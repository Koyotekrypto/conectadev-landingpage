# Agregação diária do blog: RSS → Sanity (blogPost)
# Requer: secret SANITY_API_TOKEN (e opcionalmente SANITY_PROJECT_ID, SANITY_DATASET) no repositório
name: Blog aggregate (RSS → Sanity)

on:
  schedule:
    # 8h UTC (5h BRT)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Permite rodar manualmente em Actions → Blog aggregate → Run workflow

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run blog aggregator
        env:
          SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
        run: node scripts/blog-aggregator/run.mjs
        continue-on-error: true
